services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kiosk
      POSTGRES_PASSWORD: kiosk
      POSTGRES_DB: kiosk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://kiosk:kiosk@db:5432/kiosk
    depends_on:
      - db

volumes:
  postgres_data:
